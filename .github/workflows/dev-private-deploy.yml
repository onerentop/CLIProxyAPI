name: Dev Private Deploy

on:
  push:
    branches:
      - main
      - dev
      - test
      - pre
  workflow_dispatch:
    inputs:
      branch:
        description: '部署分支（留空使用当前分支）'
        required: false
        type: string
      environment:
        description: '部署环境（留空时按分支策略自动选择）'
        required: false
        type: choice
        default: 'auto'
        options:
          - auto
          - test
          - prod

env:
  APP_NAME: CLIProxyAPI
  REGISTRY_URL: ${{ secrets.PRIVATE_REGISTRY_URL || 'docker.topren.top' }}
  IMAGE_NAME: cli-proxy-api

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: |
            network=host

      - name: Log in to Private Registry
        env:
          REGISTRY_USER: ${{ secrets.PRIVATE_REGISTRY_USERNAME }}
          REGISTRY_PWD: ${{ secrets.PRIVATE_REGISTRY_PASSWORD }}
        run: |
          echo "$REGISTRY_PWD" | docker login ${{ env.REGISTRY_URL }} -u "$REGISTRY_USER" --password-stdin

      - name: Generate Build Metadata
        id: build_meta
        run: |
          echo "VERSION=$(git describe --tags --always --dirty)" >> $GITHUB_ENV
          echo "COMMIT=$(git rev-parse --short HEAD)" >> $GITHUB_ENV
          echo "BUILD_DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> $GITHUB_ENV

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY_URL }}/${{ env.IMAGE_NAME }}
          # 生成两种 tag:
          # 1. 分支名 (例如: main, dev, test, pre) - 总是指向该分支最新代码
          # 2. commit hash (例如: sha-7b3f1a2) - 用于回溯历史版本
          tags: |
            type=ref,event=branch
            type=sha,format=short,prefix=sha-

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ env.VERSION }}
            COMMIT=${{ env.COMMIT }}
            BUILD_DATE=${{ env.BUILD_DATE }}
          # 禁用 provenance 和 attestation，生成简单的单层 manifest
          provenance: false
          sbom: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # =========================================================================
  # 测试环境部署：test 分支自动部署到测试服务器
  # =========================================================================
  deploy-test:
    needs: build-and-push
    runs-on: ubuntu-latest
    # 自动模式：test 分支 → 测试环境
    # 手动模式：environment=test 或 (environment=auto 且 test 分支)
    if: |
      (github.event_name == 'push' && github.ref_name == 'test') ||
      (github.event_name == 'workflow_dispatch' && (
        github.event.inputs.environment == 'test' ||
        (github.event.inputs.environment == 'auto' && github.ref_name == 'test')
      ))
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # 处理分支名，将 / 替换为 - 以适配 Docker Tag 规范
      - name: Sanitize Branch Name
        id: branch_name
        run: |
          RAW_BRANCH="${{ github.ref_name }}"
          SANITIZED_BRANCH="${RAW_BRANCH//\//-}"
          echo "Original: $RAW_BRANCH"
          echo "Sanitized: $SANITIZED_BRANCH"
          echo "tag=$SANITIZED_BRANCH" >> $GITHUB_OUTPUT

      - name: Generate Commit Tag
        id: commit_tag
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          echo "tag=sha-${SHORT_SHA}" >> $GITHUB_OUTPUT

      - name: SSH Deploy to Test Server
        uses: appleboy/ssh-action@master
        env:
          PRIVATE_REGISTRY_USERNAME: ${{ secrets.PRIVATE_REGISTRY_USERNAME }}
          PRIVATE_REGISTRY_PASSWORD: ${{ secrets.PRIVATE_REGISTRY_PASSWORD }}
          REGISTRY_URL: ${{ env.REGISTRY_URL }}
          IMAGE_NAME: ${{ env.IMAGE_NAME }}
          DEPLOY_DIR: ${{ secrets.TEST_DEPLOY_DIR }}
          IMAGE_TAG: ${{ steps.branch_name.outputs.tag }}
          COMMIT_TAG: ${{ steps.commit_tag.outputs.tag }}
        with:
          host: ${{ secrets.TEST_DEPLOY_HOST }}
          username: ${{ secrets.TEST_DEPLOY_USER }}
          password: ${{ secrets.TEST_DEPLOY_PASSWORD }}
          port: ${{ secrets.TEST_DEPLOY_PORT || 22 }}
          envs: PRIVATE_REGISTRY_USERNAME,PRIVATE_REGISTRY_PASSWORD,REGISTRY_URL,IMAGE_NAME,DEPLOY_DIR,IMAGE_TAG,COMMIT_TAG
          script: |
            echo "==========================================="
            echo "🧪 部署到【测试环境】- CLIProxyAPI"
            echo "==========================================="

            # 1. 登录私有仓库
            echo "$PRIVATE_REGISTRY_PASSWORD" | docker login $REGISTRY_URL -u "$PRIVATE_REGISTRY_USERNAME" --password-stdin

            # 2. 进入目录
            cd "$DEPLOY_DIR"

            # 3. 设置镜像名环境变量
            export DOCKER_IMAGE_NAME="${REGISTRY_URL}/${IMAGE_NAME}:${IMAGE_TAG}"
            export DOCKER_IMAGE_COMMIT="${REGISTRY_URL}/${IMAGE_NAME}:${COMMIT_TAG}"
            echo "Deploying image: $DOCKER_IMAGE_NAME"
            echo "Commit tag: $DOCKER_IMAGE_COMMIT"

            # 更新 .env 中的镜像名
            touch .env
            if grep -q "^DOCKER_IMAGE_NAME=" .env 2>/dev/null; then
              sed -i "s|^DOCKER_IMAGE_NAME=.*|DOCKER_IMAGE_NAME=${DOCKER_IMAGE_NAME}|" .env
            else
              echo "DOCKER_IMAGE_NAME=${DOCKER_IMAGE_NAME}" >> .env
            fi

            # 4. 拉取镜像（分支标签 + commit 标签用于回退）
            docker pull "$DOCKER_IMAGE_NAME"
            docker pull "$DOCKER_IMAGE_COMMIT" || echo "Warning: commit tag not available yet"

            # 5. 重启服务
            docker compose up -d

            # 6. 清理旧镜像 (保留最近 3 个不同的镜像版本用于回退)
            echo "📦 当前镜像列表:"
            docker images "${REGISTRY_URL}/${IMAGE_NAME}" --format "table {{.Tag}}\t{{.ID}}\t{{.CreatedAt}}"

            UNIQUE_IDS=$(docker images "${REGISTRY_URL}/${IMAGE_NAME}" --format "{{.ID}}" | awk '!seen[$0]++')
            KEEP_COUNT=3
            CURRENT=0
            IMAGES_TO_DELETE=""
            for ID in $UNIQUE_IDS; do
              CURRENT=$((CURRENT + 1))
              if [ $CURRENT -gt $KEEP_COUNT ]; then
                IMAGES_TO_DELETE="$IMAGES_TO_DELETE $ID"
              fi
            done

            if [ -n "$IMAGES_TO_DELETE" ]; then
              echo "🗑️ 清理旧镜像 (保留最近 $KEEP_COUNT 个版本):"
              echo "$IMAGES_TO_DELETE"
              echo "$IMAGES_TO_DELETE" | xargs -r docker rmi -f 2>/dev/null || true
            else
              echo "✅ 无需清理旧镜像"
            fi
            docker image prune -f

            # 7. 显示部署状态
            echo ""
            echo "==========================================="
            echo "🧪 测试环境部署完成!"
            echo "==========================================="
            docker compose ps

  # =========================================================================
  # 生产环境部署：dev / pre / main 分支部署到生产服务器
  # =========================================================================
  deploy-prod:
    needs: build-and-push
    runs-on: ubuntu-latest
    # 自动模式：dev / pre / main 分支 → 生产环境
    # 手动模式：environment=prod 或 (environment=auto 且 dev/pre/main 分支)
    if: |
      (github.event_name == 'push' && (github.ref_name == 'dev' || github.ref_name == 'pre' || github.ref_name == 'main')) ||
      (github.event_name == 'workflow_dispatch' && (
        github.event.inputs.environment == 'prod' ||
        (github.event.inputs.environment == 'auto' && (github.ref_name == 'dev' || github.ref_name == 'pre' || github.ref_name == 'main'))
      ))
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # 处理分支名，将 / 替换为 - 以适配 Docker Tag 规范
      - name: Sanitize Branch Name
        id: branch_name
        run: |
          RAW_BRANCH="${{ github.ref_name }}"
          SANITIZED_BRANCH="${RAW_BRANCH//\//-}"
          echo "Original: $RAW_BRANCH"
          echo "Sanitized: $SANITIZED_BRANCH"
          echo "tag=$SANITIZED_BRANCH" >> $GITHUB_OUTPUT

      - name: Generate Commit Tag
        id: commit_tag
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          echo "tag=sha-${SHORT_SHA}" >> $GITHUB_OUTPUT

      - name: SSH Deploy to Production Server
        uses: appleboy/ssh-action@master
        env:
          PRIVATE_REGISTRY_USERNAME: ${{ secrets.PRIVATE_REGISTRY_USERNAME }}
          PRIVATE_REGISTRY_PASSWORD: ${{ secrets.PRIVATE_REGISTRY_PASSWORD }}
          REGISTRY_URL: ${{ env.REGISTRY_URL }}
          IMAGE_NAME: ${{ env.IMAGE_NAME }}
          DEPLOY_DIR: ${{ secrets.DEPLOY_DIR }}
          IMAGE_TAG: ${{ steps.branch_name.outputs.tag }}
          COMMIT_TAG: ${{ steps.commit_tag.outputs.tag }}
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          password: ${{ secrets.DEPLOY_PASSWORD }}
          port: ${{ secrets.DEPLOY_PORT || 22 }}
          envs: PRIVATE_REGISTRY_USERNAME,PRIVATE_REGISTRY_PASSWORD,REGISTRY_URL,IMAGE_NAME,DEPLOY_DIR,IMAGE_TAG,COMMIT_TAG
          script: |
            echo "==========================================="
            echo "🚀 部署到【生产环境】- CLIProxyAPI"
            echo "==========================================="

            # 1. 登录私有仓库
            echo "$PRIVATE_REGISTRY_PASSWORD" | docker login $REGISTRY_URL -u "$PRIVATE_REGISTRY_USERNAME" --password-stdin

            # 2. 进入目录
            cd "$DEPLOY_DIR"

            # 3. 设置镜像名环境变量
            export DOCKER_IMAGE_NAME="${REGISTRY_URL}/${IMAGE_NAME}:${IMAGE_TAG}"
            export DOCKER_IMAGE_COMMIT="${REGISTRY_URL}/${IMAGE_NAME}:${COMMIT_TAG}"
            echo "Deploying image: $DOCKER_IMAGE_NAME"
            echo "Commit tag: $DOCKER_IMAGE_COMMIT"

            # 更新 .env 中的镜像名
            touch .env
            if grep -q "^DOCKER_IMAGE_NAME=" .env 2>/dev/null; then
              sed -i "s|^DOCKER_IMAGE_NAME=.*|DOCKER_IMAGE_NAME=${DOCKER_IMAGE_NAME}|" .env
            else
              echo "DOCKER_IMAGE_NAME=${DOCKER_IMAGE_NAME}" >> .env
            fi

            # 4. 拉取镜像（分支标签 + commit 标签用于回退）
            docker pull "$DOCKER_IMAGE_NAME"
            docker pull "$DOCKER_IMAGE_COMMIT" || echo "Warning: commit tag not available yet"

            # 5. 重启服务
            docker compose up -d

            # 6. 清理旧镜像 (保留最近 3 个不同的镜像版本用于回退)
            echo "📦 当前镜像列表:"
            docker images "${REGISTRY_URL}/${IMAGE_NAME}" --format "table {{.Tag}}\t{{.ID}}\t{{.CreatedAt}}"

            UNIQUE_IDS=$(docker images "${REGISTRY_URL}/${IMAGE_NAME}" --format "{{.ID}}" | awk '!seen[$0]++')
            KEEP_COUNT=3
            CURRENT=0
            IMAGES_TO_DELETE=""
            for ID in $UNIQUE_IDS; do
              CURRENT=$((CURRENT + 1))
              if [ $CURRENT -gt $KEEP_COUNT ]; then
                IMAGES_TO_DELETE="$IMAGES_TO_DELETE $ID"
              fi
            done

            if [ -n "$IMAGES_TO_DELETE" ]; then
              echo "🗑️ 清理旧镜像 (保留最近 $KEEP_COUNT 个版本):"
              echo "$IMAGES_TO_DELETE"
              echo "$IMAGES_TO_DELETE" | xargs -r docker rmi -f 2>/dev/null || true
            else
              echo "✅ 无需清理旧镜像"
            fi
            docker image prune -f

            # 7. 显示部署状态
            echo ""
            echo "==========================================="
            echo "🚀 生产环境部署完成!"
            echo "==========================================="
            docker compose ps
